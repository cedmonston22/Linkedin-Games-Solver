<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Games Solver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="header-top">
        <img class="linkedin-logo" src="icons/linkedin.svg" alt="LinkedIn" />
        <h1>LinkedIn Games Solver</h1>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Navigate to a LinkedIn game to begin</span>
    </div>

    <div class="game-grid">
      <div class="game-card" id="card-queens">
        <img class="card-icon" src="icons/queens.svg" alt="Queens" />
        <span class="card-name">Queens</span>
        <span class="card-status">--</span>
        <button class="solve-btn">Solve</button>
      </div>
      <div class="game-card" id="card-zip">
        <img class="card-icon" src="icons/zip.svg" alt="Zip" />
        <span class="card-name">Zip</span>
        <span class="card-status">--</span>
        <button class="solve-btn">Solve</button>
      </div>
      <div class="game-card" id="card-tango">
        <img class="card-icon" src="icons/tango.svg" alt="Tango" />
        <span class="card-name">Tango</span>
        <span class="card-status">--</span>
        <button class="solve-btn">Solve</button>
      </div>
      <div class="game-card" id="card-patches">
        <img class="card-icon" src="icons/patches.svg" alt="Patches" />
        <span class="card-name">Patches</span>
        <span class="card-status">--</span>
        <button class="solve-btn">Solve</button>
      </div>
    </div>

    <div class="footer">
      <span class="footer-hint">Click Solve on the active game</span>
      <span class="footer-version">v0.1.0</span>
    </div>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
