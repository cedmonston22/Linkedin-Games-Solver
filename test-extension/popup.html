<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        background: #1b1f23;
        color: #e1e4e8;
      }
      h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #f0f6fc; }
      #status { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
      #game-name { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #58a6ff; }
      .mode-toggle { display: flex; gap: 12px; margin-bottom: 12px; font-size: 12px; }
      .mode-toggle label { cursor: pointer; }
      #solve-btn {
        width: 100%; padding: 8px; border: none; border-radius: 6px;
        background: #238636; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer;
      }
      #solve-btn:hover { background: #2ea043; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>LinkedIn Games Solver</h1>
      <p id="status">Navigate to a LinkedIn game to get started.</p>
      <div id="controls" class="hidden">
        <div id="game-name"></div>
        <div class="mode-toggle">
          <label><input type="radio" name="mode" value="instant" checked /> Instant</label>
          <label><input type="radio" name="mode" value="animated" /> Animated</label>
        </div>
        <button id="solve-btn">Solve</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
